<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kindle Compatibility Probe</title>
<style>
body{font-family:Georgia,serif;background:#fff;color:#000;margin:0;padding:16px;line-height:1.4}
h1{font-size:28px;margin:0 0 12px}
.meta,.row{border:2px solid #000;border-radius:8px;padding:10px 12px;margin:10px 0}
.pass{background:#e8ffe8}.fail{background:#ffe8e8}.warn{background:#fff8d6}
.name{font-weight:bold}.detail{font-size:14px;white-space:pre-wrap;word-break:break-word}
code{font-family:monospace}
.submit-status{font-size:13px;margin-top:8px;padding:6px 10px;border-radius:6px}
.submit-ok{background:#e8ffe8;border:1px solid #4a4}.submit-fail{background:#ffe8e8;border:1px solid #c44}
</style>
</head>
<body>
<h1>Kindle Compatibility Probe</h1>
<div class="meta" id="meta">Running tests…</div>
<div id="results"></div>
<script>
(function(){
  var results = [];

  function addResult(name, ok, detail){
    results.push({name:name, ok:ok, detail:detail});
    var row = document.createElement('div');
    row.className = 'row ' + (ok ? 'pass' : 'fail');
    row.innerHTML = '<div class="name">' + (ok ? 'PASS: ' : 'FAIL: ') + name + '</div>' +
                    '<div class="detail">' + esc(detail || '') + '</div>';
    document.getElementById('results').appendChild(row);
  }

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function testSyntax(code){
    try {
      new Function(code);
      return { ok:true, detail:'parsed' };
    } catch (e) {
      return { ok:false, detail:e && e.message ? e.message : String(e) };
    }
  }

  // --- Syntax tests ---
  var syntaxTests = [
    {name:'const', code:'const x = 1;'},
    {name:'let', code:'let x = 1;'},
    {name:'arrow functions', code:'var f = (x) => x + 1;'},
    {name:'template literals', code:'var s = `hi`;'},
    {name:'async/await', code:'async function f(){ await Promise.resolve(1); }'},
    {name:'for...of', code:'for (var x of [1,2]) {}'},
    {name:'arrow function expression body', code:'Promise.resolve().then(()=>1);'},
    {name:'arrow function block body', code:'Promise.resolve().then(()=>{ var x = 1; return x; });'},
    {name:'let after arrow body', code:'Promise.resolve().then(()=>{ let x = 1; return x; });'},
    {name:'const after arrow body', code:'Promise.resolve().then(()=>{ const x = 1; return x; });'},
    {name:'object spread', code:'var x = {a:1}; var y = {...x, b:2};'},
    {name:'logical OR assignment', code:'var x = 0; x ||= 1;'},
    {name:'logical AND assignment', code:'var x = 1; x &&= 2;'},
    {name:'nullish assignment', code:'var x = null; x ??= 1;'},
    {name:'optional chaining', code:'var x = ({a:{b:1}}).a?.b;'},
    {name:'nullish coalescing', code:'var x = null ?? 1;'},
    {name:'default parameters', code:'function f(a,b){return a+(b||0);}'},
    {name:'rest parameters', code:'function f(...a){return a;}'},
    {name:'destructuring', code:'var {a,b}={a:1,b:2};'},
    {name:'spread in array literal', code:'var a=[1];var b=[...a,2];'},
    {name:'computed property names', code:'var k="a";var o={[k]:1};'},
    {name:'method shorthand', code:'var o={x(){return 1;}};'},
    {name:'class', code:'class X{constructor(){this.x=1;}}'},
    {name:'extends', code:'class X{};class Y extends X{};'},
    {name:'generator function', code:'function* g(){yield 1;}'},
    {name:'proxy (new Proxy)', kind:'syntax', code:'var t={};var p=new Proxy(t,{get(o,k){return o[k]||42;}});'},
  ];
  for (var i = 0; i < syntaxTests.length; i++) {
    var t = syntaxTests[i];
    var r = testSyntax(t.code);
    addResult(t.name, r.ok, r.detail + '\n' + t.code);
  }

  // --- API tests ---
  var apiTests = [
    {name:'fetch', run:function(){ return typeof fetch === 'function'; }},
    {name:'XMLHttpRequest', run:function(){ return typeof XMLHttpRequest === 'function'; }},
    {name:'Promise', run:function(){ return typeof Promise === 'function'; }},
    {name:'classList', run:function(){ return !!document.body.classList; }},
    {name:'dataset', run:function(){ var d=document.createElement('div'); return 'dataset' in d; }},
    {name:'querySelectorAll', run:function(){ return typeof document.querySelectorAll === 'function'; }},
    {name:'addEventListener', run:function(){ return typeof window.addEventListener === 'function'; }},
    {name:'touch events', run:function(){ return ('ontouchstart' in window) || ('ontouchend' in window); }},
    {name:'localStorage', run:function(){ try{ localStorage.setItem('__compat','1'); localStorage.removeItem('__compat'); return true; }catch(e){ return false; }}},
    {name:'history.replaceState', run:function(){ return !!(window.history && history.replaceState); }},
    {name:'URLSearchParams', run:function(){ return typeof URLSearchParams === 'function'; }},
    {name:'JSON', run:function(){ return !!(window.JSON && JSON.parse && JSON.stringify); }},
    {name:'queueMicrotask', run:function(){ return typeof queueMicrotask === 'function'; }},
    {name:'MutationObserver', run:function(){ return typeof MutationObserver === 'function'; }},
    {name:'Symbol', run:function(){ return typeof Symbol === 'function'; }},
    {name:'Map', run:function(){ return typeof Map === 'function'; }},
    {name:'Set', run:function(){ return typeof Set === 'function'; }},
    {name:'WeakMap', run:function(){ return typeof WeakMap === 'function'; }},
    {name:'WeakSet', run:function(){ return typeof WeakSet === 'function'; }},
    {name:'Array.prototype.at', run:function(){ return typeof Array.prototype.at === 'function' && [1,2,3].at(-1) === 3; }},
    {name:'Array.prototype.find', run:function(){ return typeof Array.prototype.find === 'function'; }},
    {name:'Array.prototype.findIndex', run:function(){ return typeof Array.prototype.findIndex === 'function'; }},
    {name:'Array.prototype.includes', run:function(){ return typeof Array.prototype.includes === 'function'; }},
    {name:'Array.from', run:function(){ return typeof Array.from === 'function'; }},
    {name:'Object.assign', run:function(){ return typeof Object.assign === 'function'; }},
    {name:'Object.entries', run:function(){ return typeof Object.entries === 'function'; }},
    {name:'Object.values', run:function(){ return typeof Object.values === 'function'; }},
    {name:'String.prototype.startsWith', run:function(){ return typeof String.prototype.startsWith === 'function'; }},
    {name:'String.prototype.endsWith', run:function(){ return typeof String.prototype.endsWith === 'function'; }},
    {name:'String.prototype.includes', run:function(){ return typeof String.prototype.includes === 'function'; }},
    {name:'String.prototype.trim', run:function(){ return typeof String.prototype.trim === 'function'; }},
    {name:'window.fetch as function', run:function(){ return typeof fetch === 'function'; }},
    {name:'navigator.mediaDevices', run:function(){ return !!(navigator && navigator.mediaDevices); }},
    {name:'navigator.onLine', run:function(){ return typeof navigator.onLine === 'boolean'; }},
    {name:'Intl', run:function(){ return typeof Intl === 'object'; }},
    {name:'console', run:function(){ return typeof console !== 'undefined' && typeof console.log === 'function'; }},
  ];
  for (var i = 0; i < apiTests.length; i++) {
    var t = apiTests[i];
    try {
      var ok = !!t.run();
      addResult(t.name, ok, ok ? 'available' : 'missing');
    } catch (e) {
      addResult(t.name, false, e && e.message ? e.message : String(e));
    }
  }

  // --- Environment ---
  var env = {
    ua: navigator.userAgent,
    viewport: window.innerWidth + 'x' + window.innerHeight,
    href: location.href,
    cookiesEnabled: navigator.cookieEnabled,
    platform: navigator.platform || '',
    vendor: navigator.vendor || '',
    language: navigator.language || '',
    hardwareConcurrency: navigator.hardwareConcurrency || 0,
    deviceMemory: navigator.deviceMemory || 0,
    maxTouchPoints: navigator.maxTouchPoints || 0
  };

  document.getElementById('meta').innerHTML =
    '<div class="name">Environment</div><div class="detail">' +
    esc('UA: ' + env.ua + '\nViewport: ' + env.viewport + '\nURL: ' + env.href +
        '\nPlatform: ' + env.platform + '\nVendor: ' + env.vendor +
        '\nLanguage: ' + env.language + '\nCookies: ' + env.cookiesEnabled +
        '\nCPU cores: ' + env.hardwareConcurrency + '\nMemory: ' + env.deviceMemory + 'GB' +
        '\nTouch points: ' + env.maxTouchPoints) + '</div>';

  // --- Submit results to dashboard ---
  var passCount = 0;
  var failCount = 0;
  var failures = [];
  for (var i = 0; i < results.length; i++) {
    if (results[i].ok) {
      passCount++;
    } else {
      failCount++;
      failures.push({name:results[i].name, detail:results[i].detail});
    }
  }

  var payload = {
    type: 'compat',
    env: env,
    summary: {total: results.length, pass: passCount, fail: failCount},
    failures: failures,
    ts: new Date().toISOString()
  };

  var statusEl = document.createElement('div');
  statusEl.id = 'submit-status';
  statusEl.className = 'submit-status submit-fail';
  statusEl.textContent = 'Submitting results…';
  document.getElementById('results').appendChild(statusEl);

  function xhrPost(url, data, cb) {
    try {
      var x = new XMLHttpRequest();
      x.open('POST', url, true);
      x.setRequestHeader('Content-Type', 'application/json');
      x.onreadystatechange = function() {
        if (x.readyState === 4) {
          if (x.status >= 200 && x.status < 300) {
            cb(null, x.responseText);
          } else {
            cb('HTTP ' + x.status + ': ' + x.responseText);
          }
        }
      };
      x.onerror = function() { cb('network error'); };
      x.send(JSON.stringify(data));
    } catch (e) {
      cb(e && e.message ? e.message : String(e));
    }
  }

  xhrPost('/api/log-error', payload, function(err) {
    if (err) {
      statusEl.textContent = 'Submit failed: ' + err;
      statusEl.className = 'submit-status submit-fail';
    } else {
      statusEl.textContent = 'Results submitted to dashboard ✓';
      statusEl.className = 'submit-status submit-ok';
    }
  });
})();
</script>
</body>
</html>
